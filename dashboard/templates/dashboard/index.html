{% extends 'core/base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="mt-6 px-6 py-12 bg-gray-100 rounded-xl">
    <h3 class="mb-12 text-2xl text-center">My Items</h3>
    <div class="grid grid-cols-3 gap-3">
        {% for item in items %}
        <div class="px-6">
            <a href="{% url 'item:detail' item.id %}">
                <div>
                    {% if item.image %}
                        <img src="{{ item.image.url }}" class="rounded-t-xl" alt="{{ item.name }}">
                    {% else %}
                        <div class="h-48 flex items-center justify-center bg-gray-200 rounded-t-xl text-gray-500">No image</div>
                    {% endif %}
                </div>
                <div class="px-6 bg-white rounded-b-xl">
                    <h2 class="py-3 text-2xl">{{ item.name }}</h2>
                    <p class="text-gray-500">Price: ${{ item.price }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
